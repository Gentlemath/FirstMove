name: CI

# Trigger CI on pushes and PRs to main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    # Use Ubuntu latest VM image for job execution.
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo code.
      - uses: actions/checkout@v4

      # 2) Set up Python runtime.
      # call github's official setup-python action with version 3.11 specified.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) Upgrade pip to avoid known installer issues.
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # 4) Install backend dependencies and testing tools.
      - name: Install backend dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest ruff mypy

      # 5) Run backend tests using pytest.
      - name: Run backend tests
        run: |
          cd backend
          pytest -q

      # 6) Run Python linting (ruff) on backend code.
      - name: Run Python lint
        run: |
          ruff check backend/app backend/tests

      # 7) Run static typing checks (mypy)
      - name: Run mypy type checks
        run: |
          mypy backend/app

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # 9) Install frontend dependencies reproducibly.
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      # 10) Run frontend tests (adjust for existing test scripts).
      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --watchAll=false

      # 11) Optional front-end lint step; keep workflow green even if fail (adjust as needed).
      - name: Lint frontend (optional)
        run: |
          cd frontend
          npm run lint || true
